<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Músicas - SpotMusic</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="jumbotron d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <h1>SpotMusic</h1>
            <p class="lead mb-0">Músicas da playlist</p>
        </div>
        <a class="btn btn-primary" th:href="@{/playlists/{playlistId}/musicas/cadastro(playlistId=${playlistId})}">Nova música</a>
    </div>

    <div class="app-card">
        <div th:if="${mensagem != null}" class="alert alert-info" role="alert">
            <span th:text="${mensagem == null ? '&nbsp;' : mensagem}">mensagem</span>
        </div>

        <div th:if="${#lists.isEmpty(musicas)}" class="alert alert-info" role="alert">
            0 músicas cadastradas!
        </div>

        <div th:if="${musicas != null and !#lists.isEmpty(musicas)}">
            <h4>Músicas</h4>
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Banda</th>
                    <th>Nota</th>
                    <th>Ação</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="musica : ${musicas}">
                    <td th:text="${musica.titulo}">titulo</td>
                    <td th:text="${musica.banda}">banda</td>
                    <td th:text="${musica.nota}">nota</td>
                    <td>
                        <a class="btn btn-sm btn-info" th:href="@{/playlists/{playlistId}/musicas/{musicaId}/atualizar(playlistId=${playlistId},musicaId=${musica.id})}">Editar</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/playlists/{playlistId}/musicas/{musicaId}/remover(playlistId=${playlistId},musicaId=${musica.id})}">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <hr/>
    <a class="btn btn-light" th:href="@{/playlists/listar}">Voltar</a>
    <hr/>
    <footer class="footer"><p>SpotMusic Web &copy; Projeto acadêmico</p></footer>
</div>
</body>
</html>
