<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de música - SpotMusic</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="jumbotron">
        <h1>SpotMusic</h1>
        <p class="lead mb-0">Cadastro de música</p>
    </div>

    <div class="app-card">
        <h4 th:text="${musica.id} == 0 ? 'Nova música' : 'Editar música'">Nova música</h4>

        <form th:action="@{/playlists/{playlistId}/musicas/salvar(playlistId=${playlistId})}" th:method="${musica.id} == 0 ? post : put" th:object="${musica}">
            <input id="id" type="hidden" th:field="*{id}"/>
            <div class="row">
                <div class="form-group col-md-4">
                    <label for="titulo">Título:</label>
                    <input class="form-control" id="titulo" type="text" th:field="*{titulo}"/>
                    <div class="text-warning" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="banda">Banda:</label>
                    <input class="form-control" id="banda" type="text" th:field="*{banda}"/>
                    <div class="text-warning" th:if="${#fields.hasErrors('banda')}" th:errors="*{banda}"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="nota">Nota:</label>
                    <input class="form-control" id="nota" type="number" min="0" max="10" th:field="*{nota}"/>
                    <div class="text-warning" th:if="${#fields.hasErrors('nota')}" th:errors="*{nota}"></div>
                </div>
            </div>
            <button class="btn btn-primary" type="submit">Salvar</button>
        </form>
    </div>

    <hr/>
    <a class="btn btn-light" th:href="@{/playlists/{playlistId}/musicas/listar(playlistId=${playlistId})}">Voltar</a>
    <hr/>
    <footer class="footer"><p>SpotMusic Web &copy; Projeto acadêmico</p></footer>
</div>
</body>
</html>
