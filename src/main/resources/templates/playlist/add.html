<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de playlist - SpotMusic</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="jumbotron">
        <h1>SpotMusic</h1>
        <p class="lead mb-0">Cadastro de playlist</p>
    </div>

    <div class="app-card">
        <h4 th:text="${playlist.id} == 0 ? 'Nova playlist' : 'Editar playlist'">Nova playlist</h4>

        <form th:action="@{/playlists/salvar}" th:method="${playlist.id} == 0 ? post : put" th:object="${playlist}">
            <input id="id" type="hidden" th:field="*{id}"/>
            <div class="row">
                <div class="form-group col-md-4">
                    <label for="nome">Nome:</label>
                    <input class="form-control" id="nome" type="text" th:field="*{nome}"/>
                    <div class="text-warning" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="form-group col-md-8">
                    <label for="descricao">Descrição:</label>
                    <input class="form-control" id="descricao" type="text" th:field="*{descricao}"/>
                    <div class="text-warning" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
                </div>
            </div>
            <button class="btn btn-primary" type="submit">Salvar</button>
        </form>
    </div>

    <hr/>
    <a class="btn btn-light" th:href="@{/playlists/listar}">Voltar</a>
    <hr/>
    <footer class="footer"><p>SpotMusic Web &copy; Projeto acadêmico</p></footer>
</div>
</body>
</html>
