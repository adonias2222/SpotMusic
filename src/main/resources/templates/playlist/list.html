<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Playlists - SpotMusic</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="jumbotron d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <h1>SpotMusic</h1>
            <p class="lead mb-0">Playlists cadastradas</p>
        </div>
        <a class="btn btn-primary" th:href="@{/playlists/cadastro}">Nova playlist</a>
    </div>

    <div class="app-card">
        <div th:if="${mensagem != null}" class="alert alert-info" role="alert">
            <span th:text="${mensagem}">mensagem</span>
        </div>

        <div th:if="${#lists.isEmpty(playlists)}" class="alert alert-info" role="alert">
            0 playlists cadastradas!
        </div>

        <div th:if="${playlists != null and !#lists.isEmpty(playlists)}">
            <h4>Playlists</h4>
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Ação</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="playlist : ${playlists}">
                    <td>
                        <a th:text="${playlist.nome}" th:href="@{/playlists/{id}/musicas/listar(id=${playlist.id})}">nome</a>
                    </td>
                    <td th:text="${playlist.descricao}">descricao</td>
                    <td>
                        <a class="btn btn-sm btn-info" th:href="@{/playlists/{id}/atualizar(id=${playlist.id})}">Editar</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/playlists/{id}/remover(id=${playlist.id})}">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <hr/>
    <a class="btn btn-light" th:href="@{/home}">Voltar</a>
    <hr/>
    <footer class="footer"><p>SpotMusic Web &copy; Projeto acadêmico</p></footer>
</div>
</body>
</html>
