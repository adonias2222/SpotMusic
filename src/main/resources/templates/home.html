<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SpotMusic</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="jumbotron">
        <h1>SpotMusic</h1>
        <p class="lead">Sistema simples para criar playlists, cadastrar músicas e avaliar suas favoritas.</p>
    </div>

    <div class="app-card">
        <div class="row align-items-center g-4">
            <div class="col-md-7">
                <h3>Gerencie suas playlists</h3>
                <p class="lead">Projeto Spring Boot com Thymeleaf e MySQL, preparado para usar o mesmo banco do Reserva Fácil com tabelas separadas.</p>
            </div>
            <div class="col-md-5 text-md-end">
                <a class="btn btn-success btn-lg" th:href="@{/playlists/listar}">Abrir Playlists</a>
            </div>
        </div>
    </div>

    <hr/>
    <footer class="footer">
        <p>SpotMusic Web &copy; Projeto acadêmico</p>
    </footer>
</div>
</body>
</html>
