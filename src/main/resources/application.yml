server:
  port: ${PORT:8080}

spring:
  application:
    name: spotmusic-reserva-facil
  datasource:
    # Usa o mesmo banco do Reserva Fácil, mas com tabelas separadas/prefixadas.
    url: ${DB_URL:jdbc:mysql://localhost:3306/reserva_facil?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  mvc:
    hiddenmethod:
      filter:
        enabled: true
